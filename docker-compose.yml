services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ourpaint_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
      - ./frontend/certs:/app/certs:ro
    environment:
      VITE_BACKEND_API_URL: https://localhost:8000/api
      VITE_CERT_DIR: /app/certs
      VITE_PORT: 5173
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ourpaint_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/certs:/app/certs:ro
      - backend_media:/app/media
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
      python manage.py runserver_plus 0.0.0.0:8000
      --cert-file certs/cert.pem
      --key-file certs/key.pem"

  db:
    image: postgres:13
    container_name: ourpaint_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: ourpaint_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  frontend_node_modules:
  pgadmin_data:
  backend_media:
